<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Blog preview card</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main>
      <h1 class="sr-only">Frontend Mentor | Blog preview card</h1>
      <article class="card">
        <img
          class="card__image"
          src="./assets/images/illustration-article.svg"
          width="336"
          height="200"
          alt=""
        />
        <div class="card__content">
          <div class="card__badges">
            <span class="card__badge">Learning</span>
          </div>
          <small class="card__details">Published 21 Dec 2023</small>
          <h2 class="card__title">HTML & CSS foundations</h2>
          <p class="card__text">
            These languages are the backbone of every website, defining
            structure, content, and presentation.
          </p>
        </div>
        <footer class="card__footer">
          <img
            class="card__avatar"
            src="./assets/images/image-avatar.webp"
            width="32"
            height="32"
            alt=""
          />
          <span class="card__author">Greg Hooper</span>
        </footer>
      </article>
    </main>

    <footer class="attribution">
      <p>
        Challenge by
        <a
          class="attribution__link"
          href="https://www.frontendmentor.io?ref=challenge"
          target="_blank"
          >Frontend Mentor</a
        >. Coded by
        <a class="attribution__link" href="https://rubendeman.nl"
          >Ruben de Man</a
        >.
      </p>
    </footer>
  </body>
</html>
