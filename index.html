<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <meta
      name="description"
      content="Learn the fundamentals of HTML and CSS. Explore the building blocks of web development with our blog preview card design challenge."
    />
    <meta
      name="keywords"
      content="HTML, CSS, web development, blog preview card, frontend mentor, coding challenge, learning, programming basics"
    />
    <meta name="author" content="Ruben de Man" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Blog preview card</title>

    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main>
      <article class="card">
        <img
          class="card__image"
          src="./assets/images/illustration-article.svg"
          width="336"
          alt="201"
          alt="Illustration related to article"
        />
        <div class="card__body">
          <ul class="card__badges">
            <li><a class="card__badge" href="#">Learning</a></li>
            <!-- <li><a class="card__badge" href="#">HTML</a></li>
            <li><a class="card__badge" href="#">CSS</a></li> -->
          </ul>
          <small class="card__details"
            >Published <time datetime="2023-12-21">21 Dec 2023</time></small
          >
          <a class="card__link" href="#">
            <h2 class="card__title">HTML & CSS foundations</h2>
          </a>
          <p class="card__text">
            These languages are the backbone of every website, defining
            structure, content, and presentation.
          </p>
        </div>
        <footer class="card__footer">
          <img
            class="card__avatar"
            src="./assets/images/image-avatar.webp"
            width="32"
            height="32"
            alt="Author Greg Hooper"
          />
          <a class="card__link" href="#">Greg Hooper</a>
        </footer>
      </article>
    </main>

    <footer class="attribution">
      <p>
        Challenge by
        <a
          class="attribution__link"
          href="https://www.frontendmentor.io?ref=challenge"
          target="_blank"
          >Frontend Mentor</a
        >. Coded by
        <a
          class="attribution__link"
          href="https://rubendeman.nl"
          target="_blank"
          >Ruben de Man</a
        >.
      </p>
    </footer>
  </body>
</html>
